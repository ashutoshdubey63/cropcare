{% extends 'base.html'%}
{% load static %}

{% block content %}

<style>

.loginsection{
    padding:80px 0;
    background:#f4f8f4;
}

.loginbox{
    background:white;
    border-radius:30px;
    padding:50px;
    box-shadow:0px 10px 40px rgba(0,0,0,0.08);
}

.loginhead{
    font-size:45px;
    font-weight:800;
}

.logintext{
    color:#666;
}

.form-control{
    height:60px;
    border-radius:15px;
    border:1px solid #ddd;
    padding-left:20px;
    transition:0.4s;
}

.form-control:focus{
    border:1px solid #198754;
    box-shadow:0px 0px 15px rgba(25,135,84,0.2);
}

.loginbtn{
    height:60px;
    border-radius:15px;
    font-weight:bold;
    font-size:18px;
    transition:0.4s;
}

.loginbtn:hover{
    transform:translateY(-4px);
    box-shadow:0px 10px 25px rgba(25,135,84,0.3);
}

.loginside img{
    width:100%;
}

</style>

<section class="loginsection">

<div class="container">

<div class="row align-items-center">

<div class="col-lg-6 mb-4">

<div class="loginside">

<img src="{% static 'images/login.png' %}">

</div>

</div>

<div class="col-lg-6">

<div class="loginbox">

<h1 class="loginhead">

Welcome Back 👋

</h1>

<p class="logintext mb-4">

Login to continue shopping fresh products.

</p>

<form method="post">

{% csrf_token %}

<input type="email"
name="email"
required
class="form-control mb-4"
placeholder="Enter Your Email">

<input type="password"
name="passwd"
required
class="form-control mb-4"
placeholder="Enter Password">

<input type="submit"
value="LOGIN"
class="btn btn-success w-100 loginbtn">

</form>

<div class="text-center mt-4">

Don't have an account?

<a href="/register/"
class="text-success fw-bold text-decoration-none">

Create Account

</a>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
