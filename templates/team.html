{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- Team section start -->

<style>

.teamsection{
    background:#f4f8f4;
    padding:80px 20px;
}

.teamtitle{
    font-size:50px;
    font-weight:800;
}

.teamcard{
    background:white;
    border-radius:35px;
    overflow:hidden;
    transition:0.5s;
    box-shadow:0px 10px 35px rgba(0,0,0,0.08);
    position:relative;
}

.teamcard:hover{
    transform:translateY(-12px);
}

.teamimgbox{
    height:380px;
    overflow:hidden;
    position:relative;
}

.teamimg{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.teamcard:hover .teamimg{
    transform:scale(1.08);
}

.teamoverlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:80px 20px 20px;
    background:linear-gradient(
    transparent,
    rgba(0,0,0,0.8)
    );
}

.membername{
    font-size:30px;
    font-weight:800;
    color:white;
}

.memberrole{
    color:#d1ffd8;
    font-size:18px;
}

.socialicons a{
    text-decoration:none;
}

.socialicons i{
    height:45px;
    width:45px;
    border-radius:50%;
    background:white;
    color:#198754;
    text-align:center;
    line-height:45px;
    margin:0px 5px;
    transition:0.4s;
}

.socialicons i:hover{
    transform:translateY(-6px);
    background:#198754;
    color:white;
}

</style>
